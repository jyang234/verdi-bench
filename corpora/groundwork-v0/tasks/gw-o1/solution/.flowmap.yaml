version: 1
service: walletsvc

# walletsvc's transactions must be closed (committed or rolled back) on every
# control-flow path. The obligation rides .flowmap.yaml (CODEOWNERS-gated);
# flowmap emits per-site verdicts into the graph and groundwork gates on them.
obligations:
  - name: tx-must-close
    acquire: "example.com/walletsvc/internal/store#BeginTx"
    release:
      - "example.com/walletsvc/internal/store#Commit"
      - "example.com/walletsvc/internal/store#Rollback"
