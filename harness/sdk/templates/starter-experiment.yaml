# Starter experiment.yaml — the single canonical example pre-registration.
#
# ONE copy of the example spec lives here [refactor 02 §2]; the `bench init`
# scaffold, the author page's template pane, the usage-guide example, and the
# test fixture builders all consume it, so the ">=5 divergent copies" the audit
# found (several still naming a retired model id) can never drift apart again.
# Edit this file, not the copies.
#
# A minimal, VALID spec: two arms on registered platforms, a fully date-versioned
# judge model (aliases are refused at plan time), the required cost ceiling, and
# a decision rule on the primary metric.
arms:
  - name: control
    platform: claude_code
    model: anthropic/claude-haiku-4-5-20251001
    payload: {}
  - name: treatment
    platform: codex
    model: openai/gpt-4o-2024-08-06
    payload: {}
corpus: {id: public-mini, version: "1.0.0"}
repetitions: 3
primary_metric: holdout_pass_rate
decision_rule: "delta_holdout_pass_rate > 0"
judge:
  model: google/gemini-1.5-pro-002
  rubric: rubrics/code-task-v1.md
  orders: both
  temperature: 0
seed: 1234
cost_ceiling: {amount: 25.0, currency: USD}
