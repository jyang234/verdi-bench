# Reference metering-proxy config for verdi-bench harbor egress.
# REFERENCE ONLY — validate against your Squid version and threat model before
# trusting a real run. Produces the JSONL attribution schema _scan_proxy_log
# parses (see this directory's README for the exact contract).

# --- per-trial credential -----------------------------------------------------
# The harness injects the trial id as HTTP-proxy userinfo. Require auth so a
# request with an unknown/absent credential is refused (PRA-H3: unattributed
# egress must not pass). Replace this with your real auth backend; the reference
# accepts any non-empty username via a permissive helper for local validation.
auth_param basic program /usr/lib/squid/basic_fake_auth
auth_param basic children 4
acl authenticated proxy_auth REQUIRED
http_access deny !authenticated

# --- allowlist ----------------------------------------------------------------
# The model-API hosts the run is permitted to reach. Supply the real allowlist
# out of band (spec model_hosts + infra_hosts); these are the defaults from
# harness/run/egress.py:DEFAULT_MODEL_API_HOSTS.
acl allowed_hosts dstdomain api.anthropic.com api.openai.com generativelanguage.googleapis.com api.x.ai
acl CONNECT method CONNECT

# Allow CONNECT only to allowlisted hosts; everything else is denied (and logged
# as a deny below, which the harness reads as an egress violation).
http_access allow CONNECT allowed_hosts authenticated
http_access deny CONNECT
http_access allow allowed_hosts authenticated
http_access deny all

# --- JSONL attribution log ----------------------------------------------------
# One JSON object per request: trial (the auth username), host, decision.
# %ul = auth user (the trial id); %>rd = requested destination host;
# %Ss carries the Squid result code — map allow/deny in your log post-processor,
# or use a helper. This logformat emits the core fields; a small wrapper stamps
# "decision" from the access result and an optional metered "cost".
logformat verdi_jsonl {"trial":"%ul","host":"%>rd","decision":"%Ss"}
access_log stdio:/var/log/squid/verdi.jsonl verdi_jsonl

# Internal-only: the trial containers reach the proxy over the verdi-metered
# docker network; the proxy itself reaches the allowlisted model APIs.
http_port 3128
